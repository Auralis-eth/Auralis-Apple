<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Green Wave Gradients -->
    <linearGradient id="greenWave1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    
    <linearGradient id="greenWave2" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    
    <linearGradient id="greenWave3" x1="10%" y1="20%" x2="90%" y2="80%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="50%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>
  
  <!-- Waves-Green Layer -->
  <g id="waves-green" opacity="0.8">
    <!-- Primary green wave -->
    <path d="M0,600 Q200,400 400,500 T800,450 Q900,400 1024,420 L1024,1024 L0,1024 Z" fill="url(#greenWave1)"/>
    
    <!-- Secondary green wave -->
    <path d="M0,700 Q300,550 600,600 T1024,580 L1024,1024 L0,1024 Z" fill="url(#greenWave2)"/>
    
    <!-- Tertiary flowing wave -->
    <path d="M0,800 Q150,650 350,700 Q550,750 750,720 Q850,700 1024,710 L1024,1024 L0,1024 Z" fill="url(#greenWave3)"/>
  </g>
</svg>