<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Blue Wave Gradients -->
    <linearGradient id="blueWave1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    
    <linearGradient id="blueWave2" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    
    <linearGradient id="blueWave3" x1="40%" y1="10%" x2="60%" y2="90%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  
  <!-- Waves-Blue Layer -->
  <g id="waves-blue" opacity="0.85">
    <!-- Primary blue wave -->
    <path d="M0,500 Q250,300 500,400 T850,350 Q950,320 1024,340 L1024,1024 L0,1024 Z" fill="url(#blueWave1)"/>
    
    <!-- Secondary blue wave -->
    <path d="M0,650 Q400,500 700,550 T1024,530 L1024,1024 L0,1024 Z" fill="url(#blueWave2)"/>
    
    <!-- Tertiary flowing wave -->
    <path d="M0,750 Q200,600 450,650 Q650,700 850,680 Q950,670 1024,675 L1024,1024 L0,1024 Z" fill="url(#blueWave3)"/>
  </g>
</svg>